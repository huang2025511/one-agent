# ============================================================================
# One-Agent 预发布环境配置
#
# 使用方式：ONE_AGENT_ENV=staging one-agent
# ============================================================================

agent:
  log_level: INFO
  language: zh

# 预发布环境使用稳定配置
llm:
  primary_model: sensenova/deepseek-v4-flash
  lightweight_model: sensenova/sensenova-6.7-flash-lite
  timeout: 45
  retries: 3                 # 429 限流时需要多次重试（带退避）

router:
  enabled: true
  task_complexity_thresholds:
    trivial: 0.2
    simple: 0.5
    complex: 0.8
    expert: 1.0
  self_evolution:
    enabled: false

# 修复：之前用 `monitor:` 但代码读 `monitoring:`（FullConfig.monitoring），
# 导致监控配置被 Pydantic 静默忽略。
monitoring:
  metrics_enabled: true
  tracing_enabled: true
  health_check_interval: 60

# 注：FullConfig 无 features 字段，原 `features:` 块被 Pydantic 静默忽略（死配置）。
# 自进化开关已在上方 router.self_evolution.enabled: false 中设置。
