# ============================================================================
# One-Agent 预发布环境配置
#
# 使用方式：ONE_AGENT_ENV=staging one-agent
# ============================================================================

agent:
  log_level: INFO
  language: zh

# 预发布环境使用稳定配置
llm:
  primary_model: sensenova/deepseek-v4-flash
  lightweight_model: sensenova/sensenova-6.7-flash-lite
  timeout: 45
  retries: 3                 # 429 限流时需要多次重试（带退避）

router:
  enabled: true
  task_complexity_thresholds:
    trivial: 0.2
    simple: 0.5
    complex: 0.8
    expert: 1.0
  self_evolution:
    enabled: false

# 修复 #7：移除 monitoring 段——metrics_enabled/tracing_enabled/health_check_interval
# 三个键 FullConfig.monitoring 从不读取（死配置）。env 配置合并 default_config.yaml
# 后，monitoring 继承 default 的 enabled/port 即可，无需在 env 中重复声明。

# 注：FullConfig 无 features 字段，原 `features:` 块被 Pydantic 静默忽略（死配置）。
# 自进化开关已在上方 router.self_evolution.enabled: false 中设置。
