# ============================================================================
# One-Agent 开发环境配置
#
# 使用方式：ONE_AGENT_ENV=dev one-agent
# 或复制此文件为 config.yaml 覆盖默认配置
# ============================================================================

# 开发环境使用宽松设置
agent:
  log_level: DEBUG           # 开发环境用 DEBUG
  language: zh

# 开发环境使用模拟/免费 API
llm:
  primary_model: sensenova/sensenova-6.7-flash-lite  # 使用轻量模型
  lightweight_model: sensenova/sensenova-6.7-flash-lite
  timeout: 60                # 开发环境超时更长
  retries: 3                 # 允许多次重试

# 开发环境路由优化
router:
  enabled: true
  task_complexity_thresholds:
    trivial: 0.1
    simple: 0.3
    complex: 0.6
    expert: 0.9

# 修复 #7：移除 monitoring 段——metrics_enabled/tracing_enabled/health_check_interval
# 三个键 FullConfig.monitoring 从不读取（死配置）。env 配置合并 default_config.yaml
# 后，monitoring 继承 default 的 enabled/port 即可，无需在 env 中重复声明。

# 注：FullConfig 无 features 字段，原 `features:` 块被 Pydantic 静默忽略（死配置）。
# 自进化/实验功能的真实开关在 router.self_evolution.enabled 与各模块配置中。
