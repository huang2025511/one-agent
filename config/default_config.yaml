agent:
  name: One-Agent-Test
  description: Test configuration for One-Agent
  version: 2.0.0
  data_dir: ./data
  log_level: INFO
  timezone: Asia/Shanghai
  language: zh
llm:
  primary_provider: sensenova
  primary_model: sensenova/deepseek-v4-flash
  lightweight_model: sensenova/sensenova-6.7-flash-lite
  local_endpoint: http://localhost:11434
  local_model: qwen2.5:7b
  api_keys:
    openrouter: ${OPENROUTER_API_KEY}
    openai: ${OPENAI_API_KEY}
    anthropic: ${ANTHROPIC_API_KEY}
    deepseek: ${DEEPSEEK_API_KEY}
    dashscope: ${DASHSCOPE_API_KEY}
    sensenova: ${SENSENOVA_API_KEY}
  default_temperature: 0.3
  default_max_tokens: 2048
  timeout: 30
  retries: 1
  cost_tracking:
    daily_budget: 1.0
    monthly_budget: 20.0
    db_path: data/memory/costs.db
router:
  enabled: true
  task_complexity_thresholds:
    trivial: 0.2
    simple: 0.5
    complex: 0.8
    expert: 1.0
  context_compression:
    enabled: false
  skill_lazy_loading:
    enabled: false
  self_evolution:
    enabled: false
memory:
  short_term:
    max_turns: 20
    max_tokens: 8000
  long_term:
    enabled: true
    storage: sqlite-fts5
    max_results: 5
    decay_enabled: true
  procedural:
    enabled: true
    auto_create_skills: true
    min_usage_before_skill: 3
    skill_storage: markdown
skills:
  enabled: true
  auto_discover: true
  search_paths:
  - ./skills
gateways:
  cli:
    enabled: true
  web:
    enabled: true
    host: 127.0.0.1
    port: 18791
    cors_origins:
    - http://localhost:18791
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    allowed_users: []
  wecom:
    enabled: false
    mode: webhook
    corp_id: ${WECOM_CORP_ID}
    secret: ${WECOM_CORP_SECRET}
    agent_id: ${WECOM_AGENT_ID}
    webhook_key: ${WECOM_WEBHOOK_KEY}
    callback_token: ${WECOM_CALLBACK_TOKEN}
    encoding_aes_key: ${WECOM_ENCODING_AES_KEY}
    allowed_users: []
  dingtalk:
    enabled: false
    mode: webhook
    client_id: ${DINGTALK_CLIENT_ID}
    client_secret: ${DINGTALK_CLIENT_SECRET}
    webhook_url: ${DINGTALK_WEBHOOK_URL}
    secret: ${DINGTALK_SECRET}
    allowed_users: []
  feishu:
    enabled: false
    mode: webhook
    app_id: ${FEISHU_APP_ID}
    app_secret: ${FEISHU_APP_SECRET}
    webhook_url: ${FEISHU_WEBHOOK_URL}
    verification_token: ${FEISHU_VERIFICATION_TOKEN}
    encrypt_key: ${FEISHU_ENCRYPT_KEY}
    callback_host: 0.0.0.0
    callback_port: 18793
    allowed_users: []
  discord:
    enabled: false
    bot_token: ${DISCORD_BOT_TOKEN}
    allowed_channels: []
  slack:
    enabled: false
    bot_token: ${SLACK_BOT_TOKEN}
    app_token: ${SLACK_APP_TOKEN}
    allowed_channels: []
  wechat_personal:
    enabled: false
    allowed_users: []
    reply_prefix: '[Bot] '
    hot_reload: false
execution:
  local_shell:
    enabled: true
    default_timeout: 60
    workdir: "."
  docker:
    enabled: true
    image: python:3.12-slim
    timeout: 120
    memory_limit_mb: 512
    cpu_quota: 50000
  python:
    timeout: 10
    max_output: 10000
scheduler:
  enabled: true
  timezone: Asia/Shanghai
  builtin_jobs:
    memory_housekeeping: "0 3 * * *"
    router_statistics: "0 * * * *"
  user_jobs_file: ""
security:
  system_executor_enabled: true
  system_executor_password: ${SYSTEM_EXECUTOR_PASSWORD}
  password_cache_minutes: 60
  max_password_attempts: 3
  lockout_minutes: 5
  require_password_for_dangerous: true
  command_timeout_seconds: 30
  max_output_bytes: 65536
rest:
  enabled: true
  host: 127.0.0.1
  port: 18792
  api_key: ${REST_API_KEY}
  rate_limit_per_minute: 10000
  max_chat_bytes: 65536
  cors_origins:
  - http://localhost:18792
alerting:
  rules:
  - name: high_error_rate
    metric: error_rate
    threshold: 0.15
    window_minutes: 10
    severity: warning
  - name: high_latency
    metric: avg_latency_ms
    threshold: 5000
    window_minutes: 10
    severity: warning
  - name: cost_budget
    metric: daily_cost
    threshold: 0.8
    window_minutes: 1440
    severity: critical
  channels:
  - type: log
    enabled: true
monitoring:
  enabled: true
  port: 18793
multimodal:
  enabled: true
  whisper_model: tiny
marketplace:
  enabled: true
  registry_url: ''
llm_cache:
  enabled: true
  max_entries: 1000
  max_memory_mb: 100
  ttl_seconds: 3600
