# ============================================================================
# One-Agent 配置文件
#
# 快速开始：
#   1. 设置 LLM API Key（推荐用 .env 文件，见 .env.example）
#   2. 调整下面的基础配置
#   3. 运行 one-agent 启动
#
# 环境变量引用：${VAR_NAME} 会被替换为环境变量值
# 加密敏感值：ONE_AGENT_ENCRYPTION_KEY 设置后，可用 "enc:xxx" 前缀加密存储
# ============================================================================

# ============================================================================
# 基础配置（必改）
# ============================================================================
agent:
  name: One-Agent
  version: 2.0.0
  description: Token-efficient self-evolving microkernel AI agent
  data_dir: ./data          # 数据目录：日志/记忆/技能/市场等数据都存在这里
  log_level: INFO           # DEBUG | INFO | WARNING | ERROR
  language: zh              # UI 和系统提示语言: en | zh
  timezone: Asia/Shanghai   # 时区 IANA 格式: UTC | Asia/Shanghai | America/New_York

# ============================================================================
# LLM 配置（必改）
# ============================================================================
llm:
  # 主模型 — 复杂任务用
  primary_provider: sensenova
  primary_model: sensenova/deepseek-v4-flash

  # 轻量模型 — 简单任务用（分类、摘要等）
  lightweight_model: sensenova/sensenova-6.7-flash-lite

  # 本地模型（Ollama 等）
  local_endpoint: http://localhost:11434
  local_model: qwen2.5:7b

  # API Keys — 推荐通过环境变量设置（见 .env.example）
  api_keys:
    sensenova: ${SENSENOVA_API_KEY}
    deepseek: ${DEEPSEEK_API_KEY}
    dashscope: ${DASHSCOPE_API_KEY}
    openai: ${OPENAI_API_KEY}
    anthropic: ${ANTHROPIC_API_KEY}
    openrouter: ${OPENROUTER_API_KEY}
    zhipu: ${ZHIPU_API_KEY}
    moonshot: ${MOONSHOT_API_KEY}

  # 生成参数
  default_temperature: 0.3   # 0.0=最确定, 2.0=最随机
  default_max_tokens: 2048   # 单次回复最大 token 数
  timeout: 30                # 单次请求超时（秒）
  retries: 1                 # 可重试错误的重试次数

  # 成本追踪
  cost_tracking:
    enabled: true
    daily_budget: 1.0        # 单日预算上限（USD），超过则拒绝请求
    monthly_budget: 20.0     # 单月预算上限（USD）
    db_path: data/memory/costs.db

# ============================================================================
# 智能路由（进阶）
# ============================================================================
router:
  enabled: true
  task_complexity_thresholds:
    trivial: 0.2   # 极简单 → 轻量模型
    simple: 0.5    # 简单   → 普通模型
    complex: 0.8   # 复杂   → 高级模型
    expert: 1.0    # 极复杂 → 专家模型
  context_compression:
    enabled: false  # 长上下文自动压缩
  skill_lazy_loading:
    enabled: false  # 技能按需加载
  self_evolution:
    enabled: false  # 根据使用模式自动调整阈值

# ============================================================================
# 记忆系统
# ============================================================================
memory:
  # 短期记忆（对话上下文）
  short_term:
    max_turns: 20        # 最多保留多少轮对话
    max_tokens: 8000     # 上下文 token 预算

  # 长期记忆（语义搜索 + 全文检索）
  long_term:
    enabled: true
    storage: sqlite-fts5
    max_results: 5       # 每次查询最多返回多少条记忆
    decay_enabled: true  # 旧记忆权重衰减

  # 流程记忆（自动学习技能）
  procedural:
    enabled: true
    auto_create_skills: true   # 重复模式自动生成技能
    min_usage_before_skill: 3  # 出现多少次后生成技能
    skill_storage: markdown    # markdown | json

# ============================================================================
# 技能系统
# ============================================================================
skills:
  enabled: true
  auto_discover: true    # 自动发现技能目录中的技能
  search_paths:
  - ./skills

# ============================================================================
# 消息网关
# ============================================================================
gateways:
  # CLI — 命令行（默认启用）
  cli:
    enabled: true
    prompt: 'one-agent> '

  # Web UI — 网页界面
  web:
    enabled: false
    port: 18791

  # Telegram
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    allowed_users: []     # 空=允许所有人

  # 企业微信
  wecom:
    enabled: false
    mode: webhook          # webhook | app
    webhook_key: ${WECOM_WEBHOOK_KEY}

  # 钉钉
  dingtalk:
    enabled: false
    mode: webhook
    webhook_url: ${DINGTALK_WEBHOOK_URL}

  # 飞书
  feishu:
    enabled: false
    mode: webhook
    webhook_url: ${FEISHU_WEBHOOK_URL}

  # Discord
  discord:
    enabled: false
    bot_token: ${DISCORD_BOT_TOKEN}
    allowed_channels: []

  # Slack
  slack:
    enabled: false
    bot_token: ${SLACK_BOT_TOKEN}
    signing_secret: ${SLACK_SIGNING_SECRET}
    allowed_channels: []

  # 个人微信（需 itchat-uos，按命令"微信登录"启动）
  wechat_personal:
    enabled: false
    allowed_users: []
    reply_prefix: ''
    hot_reload: false

# ============================================================================
# REST API
# ============================================================================
rest:
  enabled: true
  host: 127.0.0.1           # 绑定地址，用 0.0.0.0 允许外部访问
  port: 18792
  api_key: ''               # 空=不鉴权；推荐通过 ONE_AGENT_API_KEY 环境变量设置
  rate_limit_per_minute: 60 # 单 IP 每分钟请求限制
  max_chat_bytes: 65536     # /api/chat 最大请求体大小
  cors_origins:             # CORS 允许的来源
  - 'http://localhost'
  - 'http://127.0.0.1'

# ============================================================================
# 执行器安全
# ============================================================================
security:
  system_executor_password: ''  # 空=禁用 OS 执行；设置密码后可用 /unlock 解锁
  password_cache_minutes: 15    # 解锁后多长时间需要重新验证
  max_password_attempts: 3      # 最多尝试次数
  lockout_minutes: 5            # 锁定时长
  require_password_for_dangerous: true  # 危险命令必须验证密码
  command_timeout_seconds: 30   # 命令执行超时
  max_output_bytes: 65536       # 输出截断大小

# ============================================================================
# 其他插件（默认即可）
# ============================================================================
execution: {}       # Shell/Docker/Browser/Python 执行器
scheduler: {}       # 定时任务调度
monitoring: {}      # 监控面板
multimodal: {}      # 多模态（图片/语音）
llm_cache: {}       # LLM 响应缓存
marketplace:
  enabled: true
  registry_url: ''  # 空=使用内置市场
alerting:
  enabled: true

# ============================================================================
# 数据目录结构说明：
#   data/
#     memory/       长期记忆 SQLite 数据库
#     skills/       用户安装的技能
#     marketplace/  市场数据
#     scheduler/    定时任务数据
#     logs/         日志文件
#     workspace/    工作目录
# ============================================================================
