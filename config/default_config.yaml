agent:
  name: One-Agent
  description: One-Agent - 自然语言智能体
  version: 2.0.0
  data_dir: ./data
  log_level: DEBUG
  timezone: Asia/Shanghai
  language: zh  # 修复 #6：统一为 zh（与 i18n 内部码、dev/staging/prod_config.yaml 一致；原 zh-CN 会被 i18n 找不到而回退）
llm:
  primary_provider: sensenova
  primary_model: sensenova/deepseek-v4-flash
  lightweight_model: sensenova/sensenova-6.7-flash-lite
  local_endpoint: http://localhost:11434
  local_model: qwen2.5:7b
  api_keys:
    openrouter: null
    openai: null
    anthropic: null
    deepseek: null
    dashscope: null
    sensenova: ${SENSENOVA_API_KEY}
  default_temperature: 0.3
  default_max_tokens: 2048
  timeout: 30
  retries: 3
  cost_tracking:
    enabled: false
    daily_budget: 10.0
    monthly_budget: 100.0
    db_path: data/memory/costs.db
  semantic_cache:
    enabled: true
    threshold: 0.92
router:
  enabled: true
  task_complexity_thresholds:
    trivial: 0.2
    simple: 0.5
    complex: 0.8
    expert: 1.0
  context_compression:
    enabled: true
  skill_lazy_loading:
    enabled: false
  self_evolution:
    enabled: true
memory:
  short_term:
    max_turns: 20
    max_tokens: 8000
  long_term:
    enabled: true
    storage: sqlite-fts5
    max_results: 5
    decay_enabled: true
  procedural:
    enabled: true
    auto_create_skills: true
    min_usage_before_skill: 3
    skill_storage: markdown
skills:
  enabled: true
  auto_discover: true
  search_paths:
  - ./skills
gateways:
  wechat_personal:
    enabled: false
    allowed_users: []
    reply_prefix: ''
    hot_reload: false
  telegram:
    enabled: false
    bot_token: ''
    allowed_users: []
  wecom:
    enabled: false
    corp_id: ''
    agent_id: ''
    secret: ''
  dingtalk:
    enabled: false
    # 修复 #1：键名改为 client_id/client_secret，与 gateways/messaging.py 读取
    # （cfg.get("client_id") / cfg.get("client_secret")）及 .env.example
    # （DINGTALK_CLIENT_ID/DINGTALK_CLIENT_SECRET）对齐；原 app_key/app_secret
    # 从不被读取，stream 模式会因 client_id/secret 为空而 fail-closed。
    client_id: ''
    client_secret: ''
  feishu:
    enabled: false
    app_id: ''
    app_secret: ''
  discord:
    enabled: false
    bot_token: ''
  slack:
    enabled: false
    bot_token: ''
    signing_secret: ''
  cli:
    prompt: '> '
  web:
    enabled: false
execution:
  local_shell:
    enabled: true
    default_timeout: 60
    workdir: ./data/executions
    allowed_commands: []
  docker:
    enabled: false
    image: python:3.11-slim
    timeout: 120
    memory_limit_mb: 512
    cpu_quota: 50000
  browser:
    enabled: false
    timeout: 30
scheduler:
  enabled: true
  user_jobs_file: ''
  builtin_jobs: []
security:
  system_executor_password: ''
  password_cache_minutes: 15
  max_password_attempts: 3
  lockout_minutes: 5
  require_password_for_dangerous: true
  command_timeout_seconds: 30
  max_output_bytes: 65536
rest:
  enabled: true
  host: 127.0.0.1
  port: 18792
  api_key: ''
  rate_limit_per_minute: 10000
  max_chat_bytes: 65536
  cors_origins:
  - '*'
monitoring:
  enabled: true
  port: 18793
multimodal: {}
marketplace:
  enabled: true
  registry_url: ''
llm_cache:
  enabled: true
  ttl_seconds: 3600
  max_size: 500
