# One-Agent default configuration
# All keys use snake_case. Environment variables can be referenced via ${VAR_NAME}.
# Sensitive values (API keys) support Fernet encryption with prefix "enc:" when
# ONE_AGENT_ENCRYPTION_KEY env var is set.

agent:
  name: One-Agent
  description: Token-efficient self-evolving microkernel AI agent
  version: 2.0.0
  data_dir: ./data  # Base directory for logs, memory, marketplace, scheduler data
  log_level: INFO  # DEBUG | INFO | WARNING | ERROR
  timezone: UTC  # IANA timezone (e.g. Asia/Shanghai, America/Los_Angeles)
  language: en  # en | zh — default UI/system-prompt language
  # 角色系统 — 让 Agent 扮演不同行业/场景的专家角色
  # 角色库来自 awesome-chatgpt-prompts-zh（CC0-1.0），124 个中文角色
  # 用 /role list 查看所有角色，/role <角色名> 切换角色
  role:
    enabled: true  # 是否启用角色系统
    current: ''  # 当前角色名（空 = 默认 One-Agent 身份；填角色名即切换）
    library: data/roles/prompts-zh.json  # 角色库 JSON 文件路径

llm:
  primary_provider: sensenova  # Provider key in api_keys below
  primary_model: sensenova/deepseek-v4-flash  # provider/model format
  lightweight_model: sensenova/sensenova-6.7-flash-lite  # Used for trivial tasks
  local_endpoint: http://localhost:11434  # Ollama / local LLM server
  local_model: qwen2.5:7b
  api_keys:
    openrouter: null
    openai: null
    anthropic: null
    deepseek: null
    dashscope: null
    sensenova: ${SENSENOVA_API_KEY}  # Expanded from environment variable
  default_temperature: 0.3  # 0.0 = deterministic, 2.0 = max randomness
  default_max_tokens: 2048
  timeout: 30  # Seconds per LLM request
  retries: 1  # Retry attempts on retryable errors (429/503)
  cost_tracking:
    daily_budget: 1.0  # USD — requests rejected when daily spend exceeds this
    monthly_budget: 20.0  # USD — monthly cap
    db_path: data/memory/costs.db

router:
  enabled: true
  task_complexity_thresholds:  # 0.0-1.0 complexity → tier mapping
    trivial: 0.2
    simple: 0.5
    complex: 0.8
    expert: 1.0
  context_compression:
    enabled: false  # Compress long contexts before sending to LLM
  skill_lazy_loading:
    enabled: false  # Load skills on-demand per turn
  self_evolution:
    enabled: false  # Auto-adjust thresholds based on usage patterns

memory:
  short_term:
    max_turns: 20  # Max conversation turns kept in context
    max_tokens: 8000  # Token budget for short-term memory
  long_term:
    enabled: true
    storage: sqlite-fts5  # SQLite with FTS5 full-text search
    max_results: 5  # Max memories retrieved per query
    decay_enabled: true  # Weight decay for old memories
  procedural:
    enabled: true
    auto_create_skills: true  # Auto-create skills from repeated patterns
    min_usage_before_skill: 3  # Min pattern occurrences before skill creation
    skill_storage: markdown  # markdown | json

skills:
  enabled: true
  auto_discover: true  # Auto-discover skills in search_paths
  search_paths:
  - ./skills

gateways:
  wechat_personal:
    enabled: false  # Personal WeChat (itchat-uos) — requires QR scan
    allowed_users: []  # Empty = allow all contacts
    reply_prefix: ''  # Prepended to every reply
    hot_reload: false  # itchat hot reload (debugging only)
  # Other gateways (telegram/wecom/dingtalk/feishu/discord/slack/web) are
  # configured via environment variables; see TUTORIAL.md for details.

execution: {}  # Shell/Docker/Browser/Python executor settings (uses defaults)
scheduler: {}  # APScheduler jobs (uses defaults)

security:
  system_executor_password: ''  # Empty = OS mode disabled; set to enable /unlock
  password_cache_minutes: 15  # How long unlock stays valid
  max_password_attempts: 3  # Before lockout
  lockout_minutes: 5  # Lockout duration after max attempts
  require_password_for_dangerous: true  # DANGEROUS-level commands need approval
  command_timeout_seconds: 30  # Shell command timeout
  max_output_bytes: 65536  # Truncate command output beyond this

rest:
  enabled: true
  host: 127.0.0.1  # Bind address (use 0.0.0.0 for external access)
  port: 18792
  api_key: ''  # Empty = no auth; set or use ONE_AGENT_API_KEY env var
  rate_limit_per_minute: 60  # Per-client-IP request limit
  max_chat_bytes: 65536  # Max request body size for /api/chat
  # Restrict CORS to localhost origins — '*' allows any website (including
  # malicious pages in the user's browser) to call the API via DNS rebinding.
  cors_origins:
  - 'http://localhost'
  - 'http://127.0.0.1'

monitoring: {}  # 监控插件设置（留空使用默认值）
multimodal: {}  # 多模态插件设置（留空使用默认值）

marketplace:
  enabled: true  # 是否启用技能市场
  registry_url: ''  # 技能注册表 URL（留空 = 使用内置注册表）
  community_hub: ''  # 社区技能仓库 URL（留空 = 使用官方仓库）
  # 技能评分系统：用户可通过 API 对已安装技能打分（1.0-5.0）
  # 评分采用加权平均，持久化到 data/marketplace/registry.json

# LLM 响应缓存设置
# 支持两种后端：
#   - memory（默认）：进程内 LRU 缓存，TTL + 内存上限自动淘汰
#   - redis（可选）：跨进程共享缓存，需安装 redis-py 并配置 redis_url
# Redis 不可用时自动降级为纯内存缓存
llm_cache:
  max_size: 500  # 最大缓存条目数（1-10000）
  ttl_seconds: 3600  # 缓存存活时间（秒）
  max_memory_mb: 100  # 内存缓存上限（MB）
  redis_url: ''  # Redis 连接 URL（留空 = 纯内存模式），例如 redis://localhost:6379/0

# 提示词模板管理
# 模板存储在 data/prompt_templates/templates.json
# 支持 {{variable}} 变量替换，内置 5 个默认模板
prompt_templates:
  enabled: true  # 是否启用提示词模板系统

# 数据导出设置
# 导出文件保存到 data/exports/ 目录
export:
  enabled: true  # 是否启用数据导出
  max_sessions: 10000  # 单次导出最大会话数
  max_memory_items: 5000  # 单次导出最大记忆条数
