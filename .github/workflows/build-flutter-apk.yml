name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'flutter_client/**'
      - '.github/workflows/build-flutter-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_client/**'
      - '.github/workflows/build-flutter-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter_client/one_agent_client/.dart_tool
            flutter_client/one_agent_client/build
          key: ${{ runner.os }}-flutter-${{ hashFiles('flutter_client/one_agent_client/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get dependencies
        working-directory: flutter_client/one_agent_client
        run: flutter pub get

      - name: Generate freezed/json_serializable code
        working-directory: flutter_client/one_agent_client
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Set versionCode and versionName to build number
        working-directory: flutter_client/one_agent_client
        run: |
          # 将 pubspec.yaml 的 versionName 和 buildNumber 都更新
          # versionName: 1.0.run_number (如 1.0.33)
          # versionCode: run_number
          # 这样每次构建的 APK 版本号都比上一次大，Android 才允许覆盖安装
          sed -i "s/^version: .*/version: 1.0.${{ github.run_number }}+${{ github.run_number }}/" pubspec.yaml
          echo "Updated pubspec.yaml version:"
          grep '^version:' pubspec.yaml

      - name: Build APK
        working-directory: flutter_client/one_agent_client
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-agent-app-apk
          path: flutter_client/one_agent_client/build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_client/one_agent_client/build/app/outputs/flutter-apk/app-release.apk
          tag_name: app-v${{ github.run_number }}
          name: One-Agent App v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Gitee Release (国内加速下载)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -e
          APK_PATH="flutter_client/one_agent_client/build/app/outputs/flutter-apk/app-release.apk"
          TAG="app-v${RUN_NUMBER}"
          # 1. 创建 Gitee Release（target_commitish=main）
          RESP=$(curl -s -X POST "https://gitee.com/api/v5/repos/huang20260511/one-agent/releases" \
            -H "Content-Type: application/json;charset=UTF-8" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG}\",
              \"name\": \"One-Agent App v${RUN_NUMBER}\",
              \"body\": \"由 GitHub Actions 自动构建发布\",
              \"target_commitish\": \"main\"
            }")
          REL_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          if [ -z "$REL_ID" ]; then
            echo "Gitee Release 创建失败: $RESP"
            exit 0
          fi
          echo "Gitee Release ID: $REL_ID"
          # 2. 上传 APK 附件
          curl -s -X POST "https://gitee.com/api/v5/repos/huang20260511/one-agent/releases/${REL_ID}/attach_files" \
            -F "access_token=${GITEE_TOKEN}" \
            -F "file=@${APK_PATH}" | python3 -c "import sys,json; r=json.load(sys.stdin); a=r if isinstance(r,dict) else (r[0] if r else {}); print('Gitee 下载地址:', a.get('browser_download_url','FAILED'))"
