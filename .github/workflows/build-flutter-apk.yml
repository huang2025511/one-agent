name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'flutter_client/**'
      - '.github/workflows/build-flutter-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_client/**'
      - '.github/workflows/build-flutter-apk.yml'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: flutter_client/one_agent_client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter_client/one_agent_client/.dart_tool
            flutter_client/one_agent_client/build
          key: ${{ runner.os }}-flutter-${{ hashFiles('flutter_client/one_agent_client/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-agent-app-apk
          path: flutter_client/one_agent_client/build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          files: flutter_client/one_agent_client/build/app/outputs/flutter-apk/app-release.apk
          tag_name: app-v${{ github.run_number }}
          name: One-Agent App v${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
