name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'flutter_client/**'
      - '.github/workflows/build-flutter-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_client/**'
      - '.github/workflows/build-flutter-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter_client/one_agent_client/.dart_tool
            flutter_client/one_agent_client/build
          key: ${{ runner.os }}-flutter-${{ hashFiles('flutter_client/one_agent_client/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get dependencies
        working-directory: flutter_client/one_agent_client
        run: flutter pub get

      - name: Generate freezed/json_serializable code
        working-directory: flutter_client/one_agent_client
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Read version from pubspec.yaml
        id: version
        working-directory: flutter_client/one_agent_client
        run: |
          # 从 pubspec.yaml 读取版本号（格式: 1.0.48+48）
          # versionCode 是 + 后面的数字，用于 tag 命名
          FULL_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_CODE=$(echo "$FULL_VERSION" | cut -d '+' -f 2)
          VERSION_NAME=$(echo "$FULL_VERSION" | cut -d '+' -f 1)
          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "$FULL_VERSION" ]; then
            echo "::error::pubspec.yaml version 缺少 +N 后缀，当前值: $FULL_VERSION"
            exit 1
          fi
          echo "Full version: $FULL_VERSION"
          echo "Version name: $VERSION_NAME"
          echo "Version code: $VERSION_CODE"
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Setup signing keystore
        if: github.ref == 'refs/heads/main'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 优先使用配置的签名密钥 Secrets
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "🔐 使用配置的签名密钥（来自 Secrets）..."
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/one-agent-release.keystore
            echo "KEYSTORE_PATH=/tmp/one-agent-release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
            echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV
            echo "✅ 签名密钥已配置（来自 Secrets）"
          else
            echo "🔐 使用仓库内固定 keystore（确保签名一致性）..."
            # build.gradle 会自动检测 android/one-agent-release.keystore
            echo "✅ 仓库内 keystore 已就绪"
          fi

      - name: Build APK
        working-directory: flutter_client/one_agent_client
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-agent-app-apk
          path: flutter_client/one_agent_client/build/app/outputs/flutter-apk/*.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flutter_client/one_agent_client/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            flutter_client/one_agent_client/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          tag_name: app-v${{ steps.version.outputs.version_code }}
          name: One-Agent App v${{ steps.version.outputs.version_code }}
          body: |
            ## 下载说明
            - **app-arm64-v8a-release.apk** — 64位设备（现代手机，推荐）
            - **app-armeabi-v7a-release.apk** — 32位设备（旧手机）
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Gitee Release (国内加速下载)
        if: github.ref == 'refs/heads/main'
        id: gitee-release
        continue-on-error: true
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          set -e
          APK_DIR="flutter_client/one_agent_client/build/app/outputs/flutter-apk"
          # 优先上传 arm64（主流架构），如果失败则上传 armeabi-v7a
          APK_PATH="${APK_DIR}/app-arm64-v8a-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "⚠️ arm64 APK 不存在，回退到 fat APK"
            APK_PATH="${APK_DIR}/app-release.apk"
          fi
          TAG="app-v${VERSION_CODE}"
          MAX_RETRIES=3

          # 1. 创建 Gitee Release（target_commitish=main）— 带重试
          REL_ID=""
          for i in $(seq 1 $MAX_RETRIES); do
            echo "尝试创建 Gitee Release (第 $i/$MAX_RETRIES 次)..."
            RESP=$(curl -s -w "\n%{http_code}" -X POST "https://gitee.com/api/v5/repos/huang20260511/one-agent/releases" \
              -H "Content-Type: application/json;charset=UTF-8" \
              -d "{
                \"access_token\": \"${GITEE_TOKEN}\",
                \"tag_name\": \"${TAG}\",
                \"name\": \"One-Agent App v${VERSION_CODE}\",
                \"body\": \"由 GitHub Actions 自动构建发布\",
                \"target_commitish\": \"main\"
              }")
            HTTP_CODE=$(echo "$RESP" | tail -n1)
            BODY=$(echo "$RESP" | sed '$d')

            if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
              REL_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
              if [ -n "$REL_ID" ]; then
                echo "✅ Gitee Release 创建成功，ID: $REL_ID"
                break
              fi
            fi

            # 422 通常表示 tag 已存在，尝试获取已存在的 release
            if [ "$HTTP_CODE" = "422" ]; then
              echo "Tag 已存在，尝试获取已有 Release..."
              GET_RESP=$(curl -s "https://gitee.com/api/v5/repos/huang20260511/one-agent/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
              REL_ID=$(echo "$GET_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
              if [ -n "$REL_ID" ]; then
                echo "✅ 获取到已存在的 Release，ID: $REL_ID"
                break
              fi
            fi

            echo "❌ 创建失败 (HTTP $HTTP_CODE): $BODY"
            if [ $i -lt $MAX_RETRIES ]; then
              echo "等待 $((i * 2)) 秒后重试..."
              sleep $((i * 2))
            fi
          done

          if [ -z "$REL_ID" ]; then
            echo "::warning::Gitee Release 创建失败，跳过 Gitee 上传"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 2. 上传 APK 附件 — 带重试
          UPLOAD_SUCCESS=false
          for i in $(seq 1 $MAX_RETRIES); do
            echo "尝试上传 APK 到 Gitee (第 $i/$MAX_RETRIES 次)..."
            UPLOAD_RESP=$(curl -s -w "\n%{http_code}" -X POST \
              "https://gitee.com/api/v5/repos/huang20260511/one-agent/releases/${REL_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${APK_PATH}")
            HTTP_CODE=$(echo "$UPLOAD_RESP" | tail -n1)
            BODY=$(echo "$UPLOAD_RESP" | sed '$d')

            if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
              DOWNLOAD_URL=$(echo "$BODY" | python3 -c "import sys,json; r=json.load(sys.stdin); a=r if isinstance(r,dict) else (r[0] if r else {}); print(a.get('browser_download_url',''))" 2>/dev/null || echo "")
              if [ -n "$DOWNLOAD_URL" ]; then
                echo "✅ APK 上传成功！"
                echo "📥 Gitee 下载地址: $DOWNLOAD_URL"
                echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
                echo "status=success" >> $GITHUB_OUTPUT
                UPLOAD_SUCCESS=true
                break
              fi
            fi

            echo "❌ 上传失败 (HTTP $HTTP_CODE)"
            if [ $i -lt $MAX_RETRIES ]; then
              echo "等待 $((i * 2)) 秒后重试..."
              sleep $((i * 2))
            fi
          done

          if [ "$UPLOAD_SUCCESS" = false ]; then
            echo "::warning::Gitee APK 上传失败"
            echo "status=upload_failed" >> $GITHUB_OUTPUT
          fi
