name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout

      - name: Run unit tests with coverage
        # 修复 #3：之前只跑 unit_tests.py + test_new_features.py 两个文件，
        # tests/ 下 34 个测试文件大多未执行。现在跑全部测试，但排除：
        # - test_e2e_real.py：含硬编码真实 API key，会单独处理（避免泄漏/计费）
        # - integration_test.py：依赖外部环境，CI 中易抖动
        # - benchmark_test.py：性能基准测试，非功能正确性校验
        # - e2e_test.py：依赖外部网络（hf-mirror.com 加载 embedding 模型）
        #   和 LLM API key，在 CI 中易超时；已有独立的 "Run e2e tests" 步骤
        run: |
          python -m pytest tests/ -x --timeout=120 \
            --ignore=tests/test_e2e_real.py \
            --ignore=tests/integration_test.py \
            --ignore=tests/benchmark_test.py \
            --ignore=tests/e2e_test.py \
            --cov=. --cov-report=term-missing --cov-report=xml \
            --cov-config=.coveragerc

      - name: Run smoke tests
        run: python tests/smoke.py

      - name: Run e2e tests
        # e2e 测试依赖外部网络（hf-mirror.com embedding 模型）和 LLM API key，
        # 在 CI 中可能因网络超时而失败。设 continue-on-error 使其不阻塞 CI——
        # 单元测试 + smoke 测试仍作为硬性门禁。
        continue-on-error: true
        run: python -m pytest tests/e2e_test.py -v --timeout=180

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
