plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

// 从环境变量或 local.properties 读取 release 签名配置
// 支持通过 GitHub Secrets 注入签名信息，确保每次构建签名一致
def keystorePath = System.getenv("KEYSTORE_PATH") ?: localProperties.getProperty('keystore.path')
def keystorePassword = System.getenv("KEYSTORE_PASSWORD") ?: localProperties.getProperty('keystore.password')
def keyAlias = System.getenv("KEY_ALIAS") ?: localProperties.getProperty('key.alias')
def keyPassword = System.getenv("KEY_PASSWORD") ?: localProperties.getProperty('key.password')

android {
    namespace "com.oneagent"
    compileSdk flutter.compileSdkVersion
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.oneagent"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            if (keystorePath && keystorePassword && keyAlias && keyPassword) {
                storeFile file(keystorePath)
                storePassword keystorePassword
                keyAlias keyAlias
                keyPassword keyPassword
            }
        }
    }

    buildTypes {
        release {
            // 如果配置了 release 签名则使用 release 签名，否则使用 debug 签名（本地开发时）
            signingConfig (keystorePath ? signingConfigs.release : signingConfigs.debug)
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}
