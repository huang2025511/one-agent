plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

// 从环境变量或 local.properties 读取 release 签名配置
// 优先级：环境变量 > local.properties > 仓库内固定 keystore
// 仓库内 keystore 保证每次构建签名一致，解决"签名不一致无法覆盖安装"问题
def keystorePath = System.getenv("KEYSTORE_PATH") ?: localProperties.getProperty('keystore.path')
def keystorePassword = System.getenv("KEYSTORE_PASSWORD") ?: localProperties.getProperty('keystore.password')
def keystoreKeyAlias = System.getenv("KEY_ALIAS") ?: localProperties.getProperty('key.alias')
def keystoreKeyPassword = System.getenv("KEY_PASSWORD") ?: localProperties.getProperty('key.password')

// 如果没有配置外部签名，使用仓库内固定的 keystore（确保签名一致性）
if (!keystorePath) {
    def repoKeystore = rootProject.file('one-agent-release.keystore')
    if (repoKeystore.exists()) {
        keystorePath = repoKeystore.absolutePath
        keystorePassword = 'oneagent2024'
        keystoreKeyAlias = 'one-agent'
        keystoreKeyPassword = 'oneagent2024'
    }
}

android {
    namespace "com.oneagent"
    compileSdk flutter.compileSdkVersion
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.oneagent"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            if (keystorePath && keystorePassword && keystoreKeyAlias && keystoreKeyPassword) {
                storeFile file(keystorePath)
                storePassword keystorePassword
                keyAlias keystoreKeyAlias
                keyPassword keystoreKeyPassword
            }
        }
    }

    buildTypes {
        release {
            // 修复：使用与 signingConfigs 一致的完整条件判断
            def hasSignConfig = keystorePath && keystorePassword && keystoreKeyAlias && keystoreKeyPassword
            signingConfig (hasSignConfig ? signingConfigs.release : signingConfigs.debug)
            // 开启代码压缩和资源压缩，减小 APK 体积
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}
