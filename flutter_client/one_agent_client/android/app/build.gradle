plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
def flutterVersionName = localProperties.getProperty('flutter.versionName')

// 修复：当 CLI 和 local.properties 都没传时，从 pubspec.yaml 读取 version (如 1.0.62+62 → 62 / 1.0.62)
// 避免之前 release APK 全部是 versionCode=1 的 bug，导致客户端自检不通过
if (flutterVersionCode == null || flutterVersionName == null) {
    def pubspecFile = file('../pubspec.yaml')
    if (pubspecFile.exists()) {
        def pubspecText = pubspecFile.text
        def versionMatch = pubspecText =~ /^version:\s*([0-9.]+)\+(\d+)\s*$/
        if (versionMatch.find()) {
            if (flutterVersionName == null) flutterVersionName = versionMatch.group(1)
            if (flutterVersionCode == null) flutterVersionCode = versionMatch.group(2)
        }
    }
}
if (flutterVersionCode == null) flutterVersionCode = '1'
if (flutterVersionName == null) flutterVersionName = '1.0'

// 从环境变量或 local.properties 读取 release 签名配置
// 优先级：环境变量 > local.properties > 仓库内固定 keystore
// 仓库内 keystore 保证每次构建签名一致，解决"签名不一致无法覆盖安装"问题
def keystorePath = System.getenv("KEYSTORE_PATH") ?: localProperties.getProperty('keystore.path')
def keystorePassword = System.getenv("KEYSTORE_PASSWORD") ?: localProperties.getProperty('keystore.password')
def keystoreKeyAlias = System.getenv("KEY_ALIAS") ?: localProperties.getProperty('key.alias')
def keystoreKeyPassword = System.getenv("KEY_PASSWORD") ?: localProperties.getProperty('key.password')

// 如果没有配置外部签名，使用仓库内固定的 keystore（确保签名一致性）
if (!keystorePath) {
    def repoKeystore = rootProject.file('one-agent-release.keystore')
    if (repoKeystore.exists()) {
        keystorePath = repoKeystore.absolutePath
        keystorePassword = 'oneagent2024'
        keystoreKeyAlias = 'one-agent'
        keystoreKeyPassword = 'oneagent2024'
    }
}

android {
    namespace "com.oneagent"
    compileSdk flutter.compileSdkVersion
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.oneagent"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            if (keystorePath && keystorePassword && keystoreKeyAlias && keystoreKeyPassword) {
                storeFile file(keystorePath)
                storePassword keystorePassword
                keyAlias keystoreKeyAlias
                keyPassword keystoreKeyPassword
            }
        }
    }

    buildTypes {
        release {
            // 修复：使用与 signingConfigs 一致的完整条件判断
            def hasSignConfig = keystorePath && keystorePassword && keystoreKeyAlias && keystoreKeyPassword
            signingConfig (hasSignConfig ? signingConfigs.release : signingConfigs.debug)
            // 开启代码压缩和资源压缩，减小 APK 体积
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // 问题4 修复：跳过 release lint 检查，避免下载 test/lint 依赖。
    // GitHub Actions 构建时 Gradle 会尝试下载 androidx.test 等 test 依赖
    // 用于 lint 检查，但这些依赖在 release 构建中并非必需，且经常因网络
    // 问题下载失败导致整个构建失败。跳过 lint 检查可显著提高构建可靠性。
    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }
}

flutter {
    source '../..'
}
