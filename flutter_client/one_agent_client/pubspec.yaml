name: one_agent_client
description: One-Agent mobile client — full-featured Flutter app for Android/iOS
publish_to: 'none'
version: 1.0.0+24

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & SSE
  dio: ^5.4.3
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI
  flutter_markdown: ^0.7.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.0
  pull_to_refresh_flutter3: ^2.0.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Theming
  dynamic_color: ^1.7.0

  # Toast/Snackbar
  fluttertoast: ^8.2.6

  # Pull-to-refresh
  cupertino_icons: ^1.0.8

  # 应用内更新（OTA）
  package_info_plus: ^8.0.0
  open_filex: ^4.5.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
