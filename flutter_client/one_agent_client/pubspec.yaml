name: one_agent_client
description: One-Agent mobile client — full-featured Flutter app for Android/iOS
publish_to: 'none'
version: 1.0.52+52

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP & SSE
  dio: ^5.4.3

  # Local storage
  shared_preferences: ^2.2.3

  # UI
  flutter_markdown: ^0.7.1
  flutter_slidable: ^3.1.0

  # Utilities
  intl: ^0.19.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # 应用内更新（OTA）
  package_info_plus: ^8.0.0
  open_filex: ^4.5.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
